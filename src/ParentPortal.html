<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, #ffffff 100%);
        color: #162033;
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }

      .hero {
        background: linear-gradient(135deg, #103fb7 0%, #2f78ff 100%);
        color: white;
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 16px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .hero p {
        margin: 0;
        opacity: 0.92;
        line-height: 1.6;
      }

      .card {
        background: white;
        border: 1px solid #dbe4f0;
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 12px;
        box-shadow: 0 10px 28px rgba(20, 33, 67, 0.06);
      }

      .label {
        font-size: 12px;
        color: #60708b;
        margin-bottom: 6px;
      }

      .value {
        font-size: 20px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .body {
        line-height: 1.7;
        color: #45536c;
        font-size: 14px;
      }

      a.button {
        display: inline-block;
        background: #115dff;
        color: white;
        text-decoration: none;
        padding: 11px 14px;
        border-radius: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <? if (report.found) { ?>
        <div class="hero">
          <h1><?= report.studentName ?> 학부모 리포트</h1>
          <p><?= report.guardianName ?>님, 아래에서 이번 학습 결과와 다음 학습 제안을 확인해 주세요.</p>
        </div>

        <div class="grid">
          <div class="card">
            <div class="label">캠퍼스</div>
            <div class="value"><?= report.campusName ?></div>
          </div>
          <div class="card">
            <div class="label">반 / 교사</div>
            <div class="value"><?= report.className ?> / <?= report.teacherName ?></div>
          </div>
        </div>

        <div class="card">
          <div class="label">종합 점수</div>
          <div class="value"><?= report.overallScore ?></div>
        </div>

        <div class="card">
          <div class="label">리포트 확인</div>
          <div class="body">아래 링크로 원본 문서와 PDF를 확인할 수 있습니다.</div>
          <div style="margin-top:12px;">
            <? if (report.docUrl) { ?><a class="button" href="<?= report.docUrl ?>" target="_blank">Google Docs 열기</a><? } ?>
            <? if (report.pdfUrl) { ?><a class="button" href="<?= report.pdfUrl ?>" target="_blank" style="margin-left:8px;">PDF 열기</a><? } ?>
          </div>
        </div>

        <div class="card">
          <div class="label">전달 상태</div>
          <div class="body"><?= report.deliveryStatus ?></div>
        </div>

        <? if (report.bookingPageUrl || report.curriculumPageUrl) { ?>
          <div class="card">
            <div class="label">다음 단계</div>
            <div class="body">상담 예약 또는 커리큘럼 소개 페이지로 이어서 확인할 수 있습니다.</div>
            <div style="margin-top:12px;">
              <? if (report.bookingPageUrl) { ?><a class="button" href="<?= report.bookingPageUrl ?>" target="_blank">상담 예약</a><? } ?>
              <? if (report.curriculumPageUrl) { ?><a class="button" href="<?= report.curriculumPageUrl ?>" target="_blank" style="margin-left:8px;">커리큘럼 보기</a><? } ?>
            </div>
          </div>
        <? } ?>
      <? } else { ?>
        <div class="hero">
          <h1><?= report.title ?></h1>
          <p><?= report.message ?></p>
        </div>
      <? } ?>
    </div>
  </body>
</html>
